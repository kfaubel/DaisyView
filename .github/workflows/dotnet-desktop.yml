name: Release

on:
  push:
    tags: ['v*']

# This release script uses an Automatic token (GITHUB_TOKEN).  The following section adds the
# required write permission to the contents section.  We don't need to create our own token.
permissions:
  contents: write
  
jobs:
  release:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Build
      run: dotnet build --configuration Release --no-restore
      
    - name: Publish
      run: dotnet publish DaisyView -c Release -r win-x64 --no-self-contained --output ./publish
      
    - name: Create ZIP package
      run: |
        cd publish
        # Remove debug files
        Remove-Item *.pdb
        # Create release package
        Compress-Archive -Path * -DestinationPath ../DaisyView-win-x64.zip
        cd ..
        
    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: DaisyView-win-x64.zip
        generate_release_notes: true
        draft: false
        prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        name: DaisyView ${{ github.ref_name }}
        body: |
          ## DaisyView ${{ github.ref_name }}
          
          ### System Requirements
          - Windows 10/11 (64-bit)
          - [.NET 8 Desktop Runtime](https://dotnet.microsoft.com/download/dotnet/8.0)
          
          ### Installation
          1. Download `DaisyView-win-x64.zip`
          2. Extract all files to a folder
          3. Run `DaisyView.exe`
          
          ### What's New
          See the automatically generated release notes below.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
